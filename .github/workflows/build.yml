name: Build Iosevka

on:
  schedule:
    # Monday and Wednesday at 12:00 UTC
    - cron: "0 12 * * 1,3"
  workflow_dispatch:
    inputs:
      iosevka_tag:
        description: "Iosevka tag to build (leave empty for latest release)"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    permissions:
      contents: read
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.iosevka_tag }}" ]; then
            TAG="${{ inputs.iosevka_tag }}"
          else
            TAG=$(gh api repos/be5invis/Iosevka/releases/latest --jq '.tag_name') || {
              echo "::error::Failed to fetch latest Iosevka release"
              exit 1
            }
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Got empty tag for latest Iosevka release"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          HTTP_CODE=$(gh api repos/${{ github.repository }}/releases/tags/"$TAG" --silent -i 2>&1 | head -1 | awk '{print $2}')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Already built $TAG — skipping"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build $TAG"
          else
            echo "::error::Unexpected response ($HTTP_CODE) checking for existing release"
            exit 1
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: be5invis/Iosevka
          ref: ${{ needs.check.outputs.tag }}
          path: iosevka
          show-progress: false

      - run: cp private-build-plans.toml iosevka/

      - run: sudo apt-get update && sudo apt-get install ttfautohint

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install
        working-directory: iosevka

      - name: Build fonts
        working-directory: iosevka
        run: npm run build -- ttf::IosevkaY

      - run: |
          cd iosevka/dist/IosevkaY/TTF
          zip -r "$GITHUB_WORKSPACE/IosevkaY-TTF.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: IosevkaY-TTF-${{ needs.check.outputs.tag }}
          path: IosevkaY-TTF.zip

      - name: Create release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          SHA=$(git -C iosevka rev-parse HEAD)
          gh release create "$TAG" IosevkaY-TTF.zip \
            --title "IosevkaY ($TAG)" \
            --notes "Built from [Iosevka $TAG](https://github.com/be5invis/Iosevka/releases/tag/$TAG) (commit \`${SHA}\`)"
