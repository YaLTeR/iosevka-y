[buildPlans.IosevkaY]
family = "Iosevka Y"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = true
exportGlyphNames = true

  [buildPlans.IosevkaY.variants]
  inherits = "ss20"

    [buildPlans.IosevkaY.variants.design]
    l = "serifed-semi-tailed"

    [buildPlans.IosevkaY.variants.italic]
    bar = "force-upright"

[buildPlans.IosevkaY.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.IosevkaY.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.IosevkaY.widths.SemiCondensed]
shape = 548
menu = 4
css = "semi-condensed"

[buildPlans.IosevkaY.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaY.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
